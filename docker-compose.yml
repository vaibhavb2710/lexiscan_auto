version: "3.9"

services:
  lexiscan-api:
    build: .
    container_name: lexiscan_auto_api
    ports:
      - "5000:5000"
    environment:
      - DEBUG=false
      - PORT=5000
      - MAX_CONTENT_LENGTH=20971520
      - UPLOAD_FOLDER=uploads
      - OUTPUT_FOLDER=outputs
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
